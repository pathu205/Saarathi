    <!-- main content -->

    <div class="main-content">
      <!--header-->
      <div class="container">
        <h1>Student Management</h1>
        <div class="text-sm">
          <span class="Admin-user">Admin User</span>
          <a href="#" class="logout"> Log Out </a>
        </div>
      </div>
      <hr />

      <!--Header End-->

      

      <!--Bus Route Overview Start-->
      <div class="Bus-route-overview">
        <div class="bus-route-overview-top">
          <h2>Students Overview</h2>
          <span
  ><button class="add-new-route-button" id="addNewRouteBtn">
    <i class="bx bx-plus-circle"></i> Add New Student
  </button></span
>

<div id="addRouteFormContainer" class="addNewStudentContainer" style="display:none; padding: 20px; border: 1px solid #ccc; margin-top: 15px;">
    <h2>Add New Route Information</h2>
    <form id="newDriverForm" class="newStudentForm">

        
      <br>
        <label for="routeName">ROUTE NAME :</label>
        <input type="text" id="studentRouteName" required><br><br>

        <label for="studentName">STUDENT NAME :</label>
        <input type="text" id="studentName" required><br><br>

        <label for="studentPhone">MOBILE NO :</label>
        <input type="tel" id="studentPhone" required><br><br>

        <label for="studentEmail">EMAIL:</label>
        <input type="email" id="studentEmail"><br><br>

        <label for="password">ENTER PASSWORD</label>
        <input type="password" id="studentPassword" required><br><br>

        <label for="confirmPassword">CONFIRM PASSWORD</label>
        <input type="password" id="confirmStudentPassword" required><br><br>
      
        
        <div class="studentSubmitButton"><button type="submit">Save Student</button>
        <button type="button" id="cancelAdd">Cancel</button></div><br>
        
    </form>
</div>
        </div>

        <div class="table-container">
          <table class="route-table">
            <thead>
              <tr>
                <th>ROUTE NAME</th>
                <th>STUDENT NAME</th>
                <th>MOBILE</th>
                <th>EMAIL</th>
              
              </tr>
            </thead>
            <tbody id="tableBodyStudent">

                
            </tbody>
          </table>
        </div>
      </div>

  

      <!--Live Bus Tracking Start-->

       <div class="tracking-card">
            <h2 class="card-title">Live Bus Tracking</h2>
          
                <div id="map" style="height: 400px; border: 1px solid #AAA;"></div>
